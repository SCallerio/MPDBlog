---
layout: default
title: My Data Table
---

<h1>{{ page.title }}</h1>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Title</th>
      <th>Link</th>
    </tr>
  </thead>
  <tbody>
    {% for row in {{ site.baseurl }}/data/dc_archive_posts.csv %}
    <tr>
      <td>{{ row.date | date: "%Y-%m-%d" }}</td>
      <td>{{ row.title }}</td>
      <td><a href="{{ row.link }}">{{ row.link }}</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
